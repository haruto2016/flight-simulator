<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flight Simulator - Bomb Drop</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #5ca0d3; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #start-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; color: white; text-align: center;
        }
        .option {
            background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 12px;
            padding: 15px; cursor: pointer; margin: 10px; width: 250px; font-weight: bold; font-size: 1.1rem;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .option:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 0, 0, 0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; color: white; text-align: center;
        }
        #game-over h1 {
            font-size: 4rem; color: #ff4444; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            letter-spacing: 5px;
        }

        #ui { position: absolute; bottom: 20px; right: 20px; color: #fff; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; display: none; pointer-events: none; font-family: monospace; font-size: 1.2rem; }
        #controls { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; display: none; font-size: 0.9rem; pointer-events: none; line-height: 1.6;}
        
        /* 失速警告のスタイル */
        #stall-warning {
            display: none; position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            color: #ff2222; font-size: 5rem; font-weight: bold; font-style: italic; letter-spacing: 5px;
            text-shadow: 0 0 20px #ff0000, 2px 2px 0 #000; z-index: 100; pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="start-menu">
    <h1 style="font-size: 3rem; margin-bottom: 10px;">Infinite Flight</h1>
    <p style="margin-bottom: 30px;">戦闘機は[B]キーで爆弾を投下できます</p>
    <div class="option" onclick="startGame('airliner')">✈️ ボーイング747 (旅客機)</div>
    <div class="option" onclick="startGame('fighter')">🚀 F-15 (戦闘機)</div>
    <div class="option" onclick="startGame('stunt')">🛩️ セスナ (軽飛行機)</div>
</div>

<div id="game-over">
    <h1>GAME OVER</h1>
    <p style="font-size: 1.2rem; margin-bottom: 30px;">機体が大破しました...</p>
    <div class="option" onclick="location.reload()">🔄 リトライする</div>
</div>

<div id="stall-warning">STALL</div>

<div id="controls">
    [W] 加速 / [S] 減速<br>
    <span style="color: #66ccff; font-weight: bold;">[A] 左ラダー / [D] 右ラダー</span><br>
    <span style="color: #ffcc00; font-weight: bold;">[G] ギア(車輪) 出し入れ</span><br>
    <span style="color: #ff33aa; font-weight: bold;">[B] 爆弾投下 (戦闘機のみ)</span><br>
    <span style="color: #ff5555; font-weight: bold;">[R] 押しっぱなしで他機を探索</span><br>
    [マウス] 操縦（傾けて旋回）
</div>

<div id="ui">
    NET: <span id="status" style="color: #ffaa00; font-weight: bold;">CONNECTING...</span> (<span id="players">1</span>人)<br>
    THR: <span id="thr">0</span>%<br>
    SPD: <span id="spd">0</span><br>
    ALT: <span id="alt">0</span> ft<br>
    GEAR: <span id="gear" style="color: #00ff00; font-weight: bold;">DOWN</span>
</div>

<script>
    const SUPABASE_URL = "https://jyuwcmasqhureaphziwl.supabase.co";
    const SUPABASE_KEY = "sb_publishable_P8iXfARkpljKSDi6cbAebA_a6-wrnV5";

    let scene, camera, renderer, localPlane;
    let remotePlanes = {};
    let myId = crypto.randomUUID();
    let myColor = Math.floor(Math.random() * 0xffffff);
    let gameState = 'menu';
    let speed = 0, throttle = 0;
    let mouseX = 0, mouseY = 0;
    const keys = {w:false, s:false, a:false, d:false, r:false};
    let supabaseClient, gameChannel, lastSync = 0;
    let selectedType = '';
    let particles = []; 
    let gearDown = true; 

    // 爆弾用の配列とクールダウン
    let bombs = [];
    let lastBombTime = 0;
    const BOMB_COOLDOWN = 300; // 0.3秒に1発投下可能

    let ground, groundGeo, water;
    const GROUND_SIZE = 24000;
    const GROUND_SEGS = 60;
    const GRID_SIZE = GROUND_SIZE / GROUND_SEGS;
    const WATER_LEVEL = -80;
    let lastGroundSnapX = 999999;
    let lastGroundSnapZ = 999999;

    let cityMesh, cloudMesh;
    const BUILDING_COUNT = 1500;
    const CLOUD_COUNT = 400;
    const AREA_SIZE = 16000;
    const HALF_AREA = AREA_SIZE / 2;
    const buildingData = [];
    const cloudData = [];
    let dummy = new THREE.Object3D();

    function startGame(type) {
        selectedType = type;
        gameState = 'playing';
        document.getElementById('start-menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('controls').style.display = 'block';
        initScene(type);
        initNetwork();
        animate();
    }

    function smoothstep(edge0, edge1, x) {
        let t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
        return t * t * (3 - 2 * t);
    }

    function getGroundHeight(x, z) {
        let h = Math.sin(x/2500) * Math.cos(z/2500) * 1200 + Math.sin(x/800) * Math.sin(z/800) * 400 - 100;
        let blendX = smoothstep(400, 1200, Math.abs(x));
        let blendZ = 1.0;
        
        if (z >= -3000 && z <= 3000) {
            blendZ = 0.0;
        } else if (z < -3000) {
            blendZ = smoothstep(0, 1000, -z - 3000);
        } else if (z > 3000) {
            blendZ = smoothstep(0, 1000, z - 3000);
        }
        
        return h * Math.max(blendX, blendZ);
    }

    function initScene(type) {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x71b6e5);
        scene.fog = new THREE.Fog(0x71b6e5, 3000, 15000);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 25000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sun.position.set(2000, 3000, 2000);
        scene.add(sun);

        groundGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, GROUND_SEGS, GROUND_SEGS);
        ground = new THREE.Mesh(groundGeo, new THREE.MeshStandardMaterial({color: 0x3d6849, flatShading: true}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        const waterGeo = new THREE.PlaneGeometry(GROUND_SIZE, GROUND_SIZE, 1, 1);
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x1166aa, transparent: true, opacity: 0.85, roughness: 0.0, metalness: 0.2
        });
        water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI/2;
        water.position.y = WATER_LEVEL;
        scene.add(water);

        const runway = new THREE.Mesh(new THREE.PlaneGeometry(150, 4000), new THREE.MeshStandardMaterial({color: 0x222222}));
        runway.rotation.x = -Math.PI/2; runway.position.y = 0.5;
        scene.add(runway);
        const line = new THREE.Mesh(new THREE.PlaneGeometry(3, 4000), new THREE.MeshBasicMaterial({color: 0xdddddd}));
        line.rotation.x = -Math.PI/2; line.position.y = 0.6;
        scene.add(line);

        initCityAndClouds();

        localPlane = createModel(type, myColor);
        scene.add(localPlane);
        localPlane.add(camera);
        
        if(type === 'airliner') camera.position.set(0, 15, 50);
        else if(type === 'fighter') camera.position.set(0, 8, 30);
        else camera.position.set(0, 6, 25);

        localPlane.position.set(0, 2.5, 1800);

        window.onkeydown = (e) => { 
            let key = e.key.toLowerCase();
            if(key in keys) keys[key] = true; 
            
            if(gameState === 'playing') {
                if(key === 'g') {
                    gearDown = !gearDown;
                    const gearText = document.getElementById('gear');
                    gearText.innerText = gearDown ? 'DOWN' : 'UP';
                    gearText.style.color = gearDown ? '#00ff00' : '#ffaa00';
                }
                if(key === 'b') {
                    dropBomb(); // 爆弾投下
                }
            }
        };
        window.onkeyup = (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; };
        window.onmousemove = (e) => {
            if(gameState !== 'playing') return;
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        };
    }

    // 爆弾を投下する関数
    function dropBomb() {
        if (selectedType !== 'fighter') return; // 戦闘機以外は投下できない
        
        const now = Date.now();
        if (now - lastBombTime < BOMB_COOLDOWN) return; // クールダウン中は無視
        lastBombTime = now;

        // 爆弾の見た目を作成 (オリーブドラブ色の弾体)
        const bombGeo = new THREE.CylinderGeometry(0.3, 0.3, 2, 8);
        const bombMat = new THREE.MeshStandardMaterial({ color: 0x3b4d2e, roughness: 0.7 });
        const bombMesh = new THREE.Mesh(bombGeo, bombMat);
        
        // 投下位置を機体の少し下に設定
        let dropPos = localPlane.position.clone();
        let offset = new THREE.Vector3(0, -1.5, 0); // 機体のローカル座標で真下
        offset.applyQuaternion(localPlane.quaternion);
        dropPos.add(offset);
        
        bombMesh.position.copy(dropPos);
        bombMesh.quaternion.copy(localPlane.quaternion);
        bombMesh.rotateX(Math.PI / 2); // 進行方向に向ける

        scene.add(bombMesh);

        // 爆弾の初速（機体の進行方向ベクトル × 現在のスピード）
        const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(localPlane.quaternion);
        const velocity = direction.multiplyScalar(speed); 
        
        // 投下時の勢い（少し下向きに射出する感じ）
        velocity.y -= 0.5;

        bombs.push({
            mesh: bombMesh,
            velocity: velocity
        });
    }

    function initCityAndClouds() {
        const buildGeo = new THREE.BoxGeometry(1, 1, 1);
        const buildMat = new THREE.MeshStandardMaterial({roughness: 0.8});
        cityMesh = new THREE.InstancedMesh(buildGeo, buildMat, BUILDING_COUNT);
        const color = new THREE.Color();
        
        for(let i = 0; i < BUILDING_COUNT; i++) {
            let x = (Math.random() - 0.5) * AREA_SIZE;
            let z = (Math.random() - 0.5) * AREA_SIZE;
            let w = 30 + Math.random() * 50;
            let d = 30 + Math.random() * 50;
            let h = 50 + Math.random() * 400;
            buildingData.push({x, z, w, h, d});
            
            let hex = Math.random() > 0.6 ? 0x8899aa : (Math.random() > 0.5 ? 0x556677 : 0x223344);
            color.setHex(hex);
            cityMesh.setColorAt(i, color);
        }
        scene.add(cityMesh);

        const cGeo = new THREE.BoxGeometry(1, 1, 1);
        const cMat = new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.8, flatShading: true});
        cloudMesh = new THREE.InstancedMesh(cGeo, cMat, CLOUD_COUNT);
        for(let i = 0; i < CLOUD_COUNT; i++) {
            cloudData.push({
                x: (Math.random() - 0.5) * AREA_SIZE,
                z: (Math.random() - 0.5) * AREA_SIZE,
                y: 1500 + Math.random() * 3000, 
                s: 200 + Math.random() * 600   
            });
        }
        scene.add(cloudMesh);
    }

    function createModel(type, colorHex) {
        const group = new THREE.Group();
        const tailColor = colorHex !== undefined ? colorHex : myColor;

        if (type === 'airliner') {
            const whiteMat = new THREE.MeshStandardMaterial({color: 0xe0e0e0, roughness: 0.3});
            const customTailMat = new THREE.MeshStandardMaterial({color: tailColor, roughness: 0.4});
            const darkMat = new THREE.MeshStandardMaterial({color: 0x222222});

            const body = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 30, 32), whiteMat);
            body.rotation.x = Math.PI/2; group.add(body);
            const nose = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 16), whiteMat);
            nose.scale.set(1, 1, 2); nose.position.set(0, 0, -15); group.add(nose);
            const hump = new THREE.Mesh(new THREE.SphereGeometry(1.9, 32, 16), whiteMat);
            hump.scale.set(1, 0.8, 4); hump.position.set(0, 1.2, -7); group.add(hump);
            const tailCone = new THREE.Mesh(new THREE.ConeGeometry(2, 6, 32), whiteMat);
            tailCone.rotation.x = -Math.PI/2; tailCone.position.set(0, 0, 18); group.add(tailCone);
            const wingR = new THREE.Mesh(new THREE.BoxGeometry(18, 0.3, 7), whiteMat);
            wingR.position.set(9, -0.5, 3); wingR.rotation.y = -Math.PI/6; group.add(wingR);
            const wingL = new THREE.Mesh(new THREE.BoxGeometry(18, 0.3, 7), whiteMat);
            wingL.position.set(-9, -0.5, 3); wingL.rotation.y = Math.PI/6; group.add(wingL);
            const fin = new THREE.Mesh(new THREE.BoxGeometry(0.3, 7, 5), customTailMat);
            fin.position.set(0, 3.5, 15); fin.rotation.x = -Math.PI/12; group.add(fin);
            const hWing = new THREE.Mesh(new THREE.BoxGeometry(14, 0.2, 4), whiteMat);
            hWing.position.set(0, 0.5, 16); group.add(hWing);
            [[-6, -1.5, 1], [-12, -1.2, 3], [6, -1.5, 1], [12, -1.2, 3]].forEach(p => {
                const engine = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 3.5, 16), darkMat);
                engine.rotation.x = Math.PI/2; engine.position.set(...p); group.add(engine);
            });
        } else if (type === 'fighter') {
            const miliGray = new THREE.MeshStandardMaterial({color: 0x55595c, roughness: 0.7});
            const customTailMat = new THREE.MeshStandardMaterial({color: tailColor, roughness: 0.7});
            const glassMat = new THREE.MeshStandardMaterial({color: 0x000000, transparent: true, opacity: 0.8});

            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.2, 14), miliGray); group.add(body);
            const nose = new THREE.Mesh(new THREE.ConeGeometry(1.25, 6, 16), miliGray);
            nose.rotation.x = Math.PI/2; nose.position.z = -10; group.add(nose);
            const canopy = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), glassMat);
            canopy.scale.set(1, 1, 3); canopy.position.set(0, 0.8, -4); group.add(canopy);
            const wingR = new THREE.Mesh(new THREE.BoxGeometry(7, 0.1, 8), miliGray);
            wingR.position.set(4, 0, 2); wingR.rotation.y = -Math.PI/6; group.add(wingR);
            const wingL = new THREE.Mesh(new THREE.BoxGeometry(7, 0.1, 8), miliGray);
            wingL.position.set(-4, 0, 2); wingL.rotation.y = Math.PI/6; group.add(wingL);
            const tailR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 3.5), customTailMat);
            tailR.position.set(1.5, 1.5, 6); tailR.rotation.x = -Math.PI/12; group.add(tailR);
            const tailL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 3, 3.5), customTailMat);
            tailL.position.set(-1.5, 1.5, 6); tailL.rotation.x = -Math.PI/12; group.add(tailL);
            const hTail = new THREE.Mesh(new THREE.BoxGeometry(8, 0.1, 4), miliGray);
            hTail.position.set(0, 0, 7); group.add(hTail);
            
            // 翼の下のミサイル(装飾)
            const missile = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 4, 8), new THREE.MeshStandardMaterial({color:0xffffff}));
            missile.rotation.x = Math.PI/2; missile.position.set(4, -0.5, 2); group.add(missile);
            const missile2 = missile.clone(); missile2.position.set(-4, -0.5, 2); group.add(missile2);

        } else {
            const whiteMat = new THREE.MeshStandardMaterial({color: 0xdddddd});
            const customTailMat = new THREE.MeshStandardMaterial({color: tailColor});
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 6), whiteMat); group.add(body);
            const wing = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 2), whiteMat); wing.position.y = 0.8; group.add(wing);
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.5, 1.5), customTailMat); tail.position.set(0, 1, 2.5); group.add(tail);
        }
        return group;
    }

    function initNetwork() {
        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                gameChannel = supabaseClient.channel('room1').on('broadcast', {event:'move'}, (p) => {
                    const d = p.payload;
                    if(!remotePlanes[d.id]) {
                        remotePlanes[d.id] = createModel(d.type, d.color);
                        scene.add(remotePlanes[d.id]);
                        const marker = new THREE.Mesh(new THREE.OctahedronGeometry(150, 0), new THREE.MeshBasicMaterial({color: 0xff0000, wireframe: true}));
                        marker.name = "radarMarker"; marker.visible = false;
                        remotePlanes[d.id].add(marker);
                    }
                    remotePlanes[d.id].position.lerp(new THREE.Vector3(d.x, d.y, d.z), 0.2);
                    remotePlanes[d.id].quaternion.slerp(new THREE.Quaternion(d.qx, d.qy, d.qz, d.qw), 0.2);
                    remotePlanes[d.id].lastSeen = Date.now();
                }).subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('status').innerText = 'ONLINE';
                        document.getElementById('status').style.color = '#00ff00';
                    }
                });
            }
        } catch(e) { 
            console.log("Offline mode"); 
            document.getElementById('status').innerText = 'OFFLINE';
            document.getElementById('status').style.color = '#ff4444';
        }
    }

    function createExplosion(position) {
        const particleCount = 200;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = position.x;
            positions[i * 3 + 1] = position.y;
            positions[i * 3 + 2] = position.z;
            velocities.push({ x: (Math.random() - 0.5) * 15, y: (Math.random() - 0.5) * 15 + 5, z: (Math.random() - 0.5) * 15 });
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0xff5500, size: 5, transparent: true, opacity: 1 });
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);
        particles.push({ mesh: particleSystem, velocities: velocities, life: 1.0 });
    }

    function triggerGameOver() {
        if (gameState === 'crashed') return;
        gameState = 'crashed';
        document.getElementById('stall-warning').style.display = 'none';
        createExplosion(localPlane.position);
        localPlane.children.forEach(child => { if (child !== camera) child.visible = false; });
        camera.position.set(0, 30, 80);
        camera.lookAt(localPlane.position);
        document.getElementById('ui').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        setTimeout(() => { document.getElementById('game-over').style.display = 'flex'; }, 1000);
    }

    function updateInfiniteWorld(px, pz) {
        let snapX = Math.floor(px / GRID_SIZE) * GRID_SIZE;
        let snapZ = Math.floor(pz / GRID_SIZE) * GRID_SIZE;
        
        if (snapX !== lastGroundSnapX || snapZ !== lastGroundSnapZ) {
            ground.position.x = snapX;
            ground.position.z = snapZ;
            water.position.x = snapX;
            water.position.z = snapZ;
            
            const pos = groundGeo.attributes.position.array;
            for(let i=0; i<pos.length; i+=3) {
                let vx = pos[i] + snapX;
                let vz = -pos[i+1] + snapZ; 
                pos[i+2] = getGroundHeight(vx, vz);
            }
            groundGeo.computeVertexNormals();
            groundGeo.attributes.position.needsUpdate = true;
            lastGroundSnapX = snapX;
            lastGroundSnapZ = snapZ;
        }

        for(let i=0; i<BUILDING_COUNT; i++) {
            let b = buildingData[i];
            let dx = b.x - px;
            let dz = b.z - pz;
            
            if (dx > HALF_AREA) b.x -= AREA_SIZE; else if (dx < -HALF_AREA) b.x += AREA_SIZE;
            if (dz > HALF_AREA) b.z -= AREA_SIZE; else if (dz < -HALF_AREA) b.z += AREA_SIZE;
            
            let gH = getGroundHeight(b.x, b.z);
            let isRunway = Math.abs(b.x) < 800 && b.z > -3000 && b.z < 3000;
            
            if (isRunway || gH < WATER_LEVEL) {
                dummy.position.set(b.x, -1000, b.z); 
            } else {
                dummy.position.set(b.x, gH + b.h/2, b.z);
                dummy.scale.set(b.w, b.h, b.d);
                
                if (gameState === 'playing' && Math.abs(px - b.x) < b.w/2 + 5 && Math.abs(pz - b.z) < b.d/2 + 5) {
                    if (localPlane.position.y < gH + b.h) triggerGameOver();
                }
            }
            dummy.updateMatrix();
            cityMesh.setMatrixAt(i, dummy.matrix);
        }
        cityMesh.instanceMatrix.needsUpdate = true;

        for(let i=0; i<CLOUD_COUNT; i++) {
            let c = cloudData[i];
            let dx = c.x - px;
            let dz = c.z - pz;
            if (dx > HALF_AREA) c.x -= AREA_SIZE; else if (dx < -HALF_AREA) c.x += AREA_SIZE;
            if (dz > HALF_AREA) c.z -= AREA_SIZE; else if (dz < -HALF_AREA) c.z += AREA_SIZE;
            
            dummy.position.set(c.x, c.y, c.z);
            dummy.scale.set(c.s, c.s * 0.4, c.s);
            dummy.updateMatrix();
            cloudMesh.setMatrixAt(i, dummy.matrix);
        }
        cloudMesh.instanceMatrix.needsUpdate = true;
    }

    function animate() {
        requestAnimationFrame(animate);

        // パーティクル（爆発）のアニメーション
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            let positions = p.mesh.geometry.attributes.position.array;
            for (let j = 0; j < positions.length / 3; j++) {
                positions[j * 3] += p.velocities[j].x;
                positions[j * 3 + 1] += p.velocities[j].y;
                positions[j * 3 + 2] += p.velocities[j].z;
                p.velocities[j].y -= 0.2; 
            }
            p.mesh.geometry.attributes.position.needsUpdate = true;
            p.life -= 0.02; p.mesh.material.opacity = p.life;
            if (p.life < 0.5) p.mesh.material.color.setHex(0x333333);
            if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
        }

        // 投下された爆弾の物理演算と当たり判定
        for (let i = bombs.length - 1; i >= 0; i--) {
            let b = bombs[i];
            
            b.velocity.y -= 0.08; // 重力で落下加速
            b.mesh.position.add(b.velocity);
            
            // 落ちていく方向（速度ベクトル）に弾の頭を向ける
            b.mesh.lookAt(b.mesh.position.clone().add(b.velocity));
            b.mesh.rotateX(Math.PI/2); 

            // 地形・水面との衝突判定
            let groundH = getGroundHeight(b.mesh.position.x, b.mesh.position.z);
            let surfaceH = Math.max(groundH, WATER_LEVEL);

            if (b.mesh.position.y <= surfaceH + 1) {
                // 衝突したら爆発
                createExplosion(b.mesh.position);
                scene.remove(b.mesh);
                bombs.splice(i, 1);
            }
        }

        let playerCount = 1;
        const now = Date.now();
        for (const id in remotePlanes) {
            if (now - remotePlanes[id].lastSeen > 5000) {
                scene.remove(remotePlanes[id]); delete remotePlanes[id];
            } else {
                playerCount++;
                const marker = remotePlanes[id].getObjectByName("radarMarker");
                if (marker) marker.visible = keys.r;
            }
        }
        document.getElementById('players').innerText = playerCount;

        if(gameState === 'playing') {
            if(keys.w) throttle += 0.5; if(keys.s) throttle -= 0.5;
            throttle = Math.max(0, Math.min(100, throttle));
            
            let maxSpeed = selectedType === 'fighter' ? 35 : (selectedType === 'airliner' ? 18 : 10);
            let stallSpeed = maxSpeed * 0.35; 
            
            let euler = new THREE.Euler().setFromQuaternion(localPlane.quaternion, 'YXZ');

            let gravityEffect = euler.x * maxSpeed * 0.5; 
            let targetSpeed = (throttle/100 * maxSpeed) + gravityEffect;
            if(targetSpeed < 0) targetSpeed = 0; 

            speed += (targetSpeed - speed) * 0.03;

            let groundH = getGroundHeight(localPlane.position.x, localPlane.position.z);
            let surfaceH = Math.max(groundH, WATER_LEVEL);

            let isStalling = false;
            if (localPlane.position.y > surfaceH + 5 && speed < stallSpeed && euler.x < 0.2) {
                isStalling = true;
            }

            const stallWarning = document.getElementById('stall-warning');
            if (isStalling) {
                stallWarning.style.display = 'block';
                stallWarning.style.opacity = Math.sin(Date.now() / 80) > 0 ? 1 : 0.2; 
                
                localPlane.position.y -= (stallSpeed - speed) * 0.2; 
                euler.x += 0.015; 
            } else {
                stallWarning.style.display = 'none';
            }

            let pitchInput = mouseY * 0.02;
            if (isStalling && pitchInput < 0) pitchInput *= 0.1; 
            euler.x += pitchInput; 
            euler.x = Math.max(-0.8, Math.min(0.8, euler.x));
            
            let targetRoll = -mouseX * 1.0; 
            euler.z += (targetRoll - euler.z) * 0.05; 
            
            let yawDelta = 0;
            if (keys.a) yawDelta += 0.015;
            if (keys.d) yawDelta -= 0.015;
            yawDelta += Math.sin(euler.z) * 0.02; 
            euler.y += yawDelta;
            
            localPlane.quaternion.setFromEuler(euler);

            let isGrounded = localPlane.position.y <= surfaceH + 2.6;
            if (isGrounded && surfaceH <= 1 && surfaceH === groundH && gearDown) {
                let gEuler = new THREE.Euler().setFromQuaternion(localPlane.quaternion, 'YXZ');
                if (gEuler.x < 0) gEuler.x = 0; 
                gEuler.z *= 0.8; 
                localPlane.quaternion.setFromEuler(gEuler);
            }

            localPlane.translateZ(-speed);

            updateInfiniteWorld(localPlane.position.x, localPlane.position.z);

            groundH = getGroundHeight(localPlane.position.x, localPlane.position.z);
            surfaceH = Math.max(groundH, WATER_LEVEL);

            if (localPlane.position.y < surfaceH + 2.5) {
                let currentEuler = new THREE.Euler().setFromQuaternion(localPlane.quaternion, 'YXZ');

                if (surfaceH === WATER_LEVEL) {
                    if (!gearDown && speed < 15 && currentEuler.x > -0.2) {
                        localPlane.position.y = surfaceH + 2.5;
                        speed *= 0.98;
                        if (currentEuler.x < 0) currentEuler.x *= 0.8; 
                        currentEuler.z *= 0.8; 
                        localPlane.quaternion.setFromEuler(currentEuler);
                    } else {
                        triggerGameOver();
                    }
                } else if (surfaceH > 1) {
                    triggerGameOver();
                } else if (!gearDown) {
                    triggerGameOver();
                } else {
                    localPlane.position.y = surfaceH + 2.5;
                }
            }

            document.getElementById('thr').innerText = Math.round(throttle);
            document.getElementById('spd').innerText = Math.round(speed*100);
            document.getElementById('alt').innerText = Math.round(localPlane.position.y * 10);

            if(Date.now() - lastSync > 100 && gameChannel) {
                lastSync = Date.now();
                gameChannel.send({type:'broadcast', event:'move', payload:{
                    id:myId, type:selectedType, x:localPlane.position.x, y:localPlane.position.y, z:localPlane.position.z,
                    qx:localPlane.quaternion.x, qy:localPlane.quaternion.y, qz:localPlane.quaternion.z, qw:localPlane.quaternion.w,
                    color: myColor
                }});
            }
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
